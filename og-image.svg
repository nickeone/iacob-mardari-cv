<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#0e131c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fd1c5"/>
      <stop offset="100%" style="stop-color:#d8b97a"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="10%" r="50%">
      <stop offset="0%" style="stop-color:rgba(79,209,197,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative eye SVG right side -->
  <g transform="translate(830, 200)" opacity="0.18" stroke="#4fd1c5" fill="none">
    <ellipse cx="150" cy="150" rx="148" ry="89" stroke-width="1.5"/>
    <ellipse cx="150" cy="150" rx="110" ry="66" stroke-width="1"/>
    <circle cx="150" cy="150" r="55" stroke="#d8b97a" stroke-width="1.5"/>
    <circle cx="150" cy="150" r="37" stroke-width="1"/>
    <circle cx="150" cy="150" r="18" fill="#4fd1c5" opacity="0.5"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="4" height="120" rx="2" fill="url(#accent)"/>

  <!-- Eyebrow pill -->
  <rect x="104" y="178" width="290" height="32" rx="16" fill="rgba(79,209,197,0.08)" stroke="rgba(79,209,197,0.3)" stroke-width="1"/>
  <circle cx="123" cy="194" r="5" fill="#4fd1c5"/>
  <text x="138" y="199" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4fd1c5" letter-spacing="2" text-transform="uppercase">VIITOR MEDIC OFTALMOLOG</text>

  <!-- Name -->
  <text x="104" y="265" font-family="Georgia, serif" font-size="68" font-weight="600" fill="#e8edf5" letter-spacing="-1">Iacob Mardari</text>

  <!-- Gradient subtitle -->
  <text x="104" y="320" font-family="Georgia, serif" font-size="36" font-weight="400" fill="url(#accent)">pasiune pentru oftalmologie</text>

  <!-- Divider -->
  <rect x="104" y="348" width="500" height="1" fill="rgba(255,255,255,0.1)"/>

  <!-- Info pills -->
  <rect x="104" y="368" width="170" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="189" y="390" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9aa6b8" text-anchor="middle">📍 Strasbourg</text>

  <rect x="284" y="368" width="200" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="384" y="390" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9aa6b8" text-anchor="middle">🏥 Internship Cluj 2026</text>

  <rect x="494" y="368" width="210" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="599" y="390" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#9aa6b8" text-anchor="middle">🇫🇷 🇷🇴 🇬🇧 Multilingv</text>

  <!-- URL -->
  <text x="104" y="450" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#4fd1c5" opacity="0.7">iacob-mardari-cv.vercel.app</text>
</svg>
